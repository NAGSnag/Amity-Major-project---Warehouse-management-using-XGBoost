<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: "Monospac821 BT", "Lucida Console", "Courier New", monospace;
            background:
                radial-gradient(1000px 400px at 50% -100px, #29324a 0%, #0d0f18 60%),
                #0b0d13;
            color: #e9edf4;
            min-height: 100vh;
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-rows: 76px 1fr;
            gap: 14px;
            padding: 12px;
        }

        .topbar {
            border-radius: 18px;
            border: 1px solid #262b3b;
            background: rgba(12, 15, 24, 0.9);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            padding: 8px 14px;
        }

        .pill {
            border: none;
            color: #eef2f9;
            background: #2f3345;
            border-radius: 999px;
            padding: 8px 18px;
            font-size: 18px;
            cursor: pointer;
            font-family: inherit;
        }

        .pill.active {
            background: #52c28f;
            color: #071811;
            font-weight: 700;
            min-width: 280px;
        }

        .pill.dashboard-active {
            background: #4a55d8;
            color: #eff2fe;
            font-weight: 700;
            box-shadow: 0 0 0 2px rgba(74, 85, 216, 0.28);
        }

        .avatar { width: 54px; height: 54px; border-radius: 50%; background: #eceef4; margin-left: auto; }

        .content {
            display: grid;
            grid-template-columns: 390px 1fr;
            gap: 16px;
            min-height: calc(100vh - 120px);
        }

        .left-column {
            display: grid;
            grid-template-rows: auto auto;
            align-content: start;
            gap: 10px;
            margin-bottom: 50px;
            max-height: 900px;
        }

        .panel {
            background: rgba(30, 33, 40, 0.95);
            border: 1px solid #323847;
            border-radius: 30px;
            padding: 18px;
            max-height: 500px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        }

        .bot-card {
            background: linear-gradient(145deg, #0b1430, #101b3b);
            border: 1px solid #1f2f5c;
            border-radius: 34px;
            padding: 22px;
            max-height: 900px;
            overflow-y: auto;
        }

        .bot-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 20px;
            font-weight: 700;
        }

        .alert {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            border-radius: 14px;
            border: 1px solid #324670;
            background: rgba(206, 221, 255, 0.05);
            padding: 10px 12px;
            margin-bottom: 10px;
            line-height: 1.25;
            font-size: 13px;
            font-weight: 600;
        }

        .alert-text { flex: 1; }

        .alert-done-btn {
            border: none;
            border-radius: 8px;
            background: #2ac481;
            color: #082316;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 10px;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
        }

        .alert.warn  { border-left: 3px solid #ea7b39; }
        .alert.info  { border-left: 3px solid #34c7d8; }

        .action-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 30px;
            justify-content: flex-start;
            max-height: 360px;
        }

        .action-title {
            font-size: 22px;
            font-weight: 700;
            color: #e9edf4;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .action-btn {
            border: none;
            border-radius: 12px;
            background: linear-gradient(180deg, #4a55d8, #4250c8);
            color: #eff2fe;
            font-size: 18px;
            letter-spacing: 1px;
            text-align: left;
            width: 100%;
            padding: 14px 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        /* ── MAP PANEL ── */
        .map-panel {
            background: #f6f6f6;
            color: #111827;
            border-radius: 34px;
            padding: 18px 22px;
            border: 1px solid #d4d8dd;
            overflow-y: auto;
            position: relative;
        }

        .map-header {
            display: grid;
            grid-template-columns: 50px 1fr 50px;
            align-items: center;
            margin-bottom: 14px;
            position: sticky;
            top: 0;
            background: #f6f6f6;
            z-index: 10;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }

        .arrow {
            font-size: 42px;
            font-weight: 700;
            color: #161616;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            border-radius: 8px;
            transition: background 0.15s;
            padding: 4px;
        }

        .arrow:hover { background: rgba(0,0,0,0.08); }

        .map-title {
            text-align: center;
            font-size: 26px;
            letter-spacing: 2px;
            font-weight: 700;
            color: #111827;
        }

        .section-badge {
            text-align: center;
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 12px;
            color: #374151;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }

        .stat-chip strong { font-size: 18px; color: #111827; }
        .stat-chip.green strong { color: #059669; }
        .stat-chip.red   strong { color: #dc2626; }
        .stat-chip.blue  strong { color: #2563eb; }

        /* ── SHELVES GRID ── */
        .shelves {
            display: grid;
            grid-template-columns: repeat(var(--shelf-cols, 3), minmax(200px, 1fr));
            gap: 24px 32px;
            padding: 4px 8px 28px;
        }

        .shelf-card { display: grid; gap: 8px; }

        .shelf-id {
            font-size: 12px;
            color: #374151;
            font-family: inherit;
            text-transform: lowercase;
            margin-bottom: 2px;
        }

        .shelf-title {
            min-height: 18px;
            font-size: 13px;
            color: #111827;
        }

        .rack {
            min-height: 200px;
            border-radius: 8px;
            display: grid;
            gap: 8px;
            align-content: start;
            padding: 12px;
            background:
                repeating-linear-gradient(
                    to right,
                    #a76543 0,
                    #b97753 16px,
                    #a96845 32px
                );
            border: 5px solid #9a5d3e;
            box-shadow: inset 0 -8px 0 rgba(65, 33, 17, 0.2);
        }

        .box {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 4px;
            align-content: start;
            width: 100%;
            min-height: 90px;
            padding: 6px;
            background: linear-gradient(145deg, #f0d4a8, #cfab77);
            border: 2px solid #f5dfbb;
            box-shadow: 0 4px 0 rgba(95, 64, 29, 0.3);
            border-radius: 3px;
            color: #4b2c12;
            font-size: 11px;
            line-height: 1.2;
            transition: opacity 200ms ease, transform 200ms ease, box-shadow 250ms ease;
            cursor: pointer;
        }

        .box:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(95, 64, 29, 0.3);
        }

        .box.empty {
            background: linear-gradient(145deg, #e8e8e8, #d0d0d0);
            border-color: #ccc;
            color: #888;
            opacity: 0.6;
        }

        .box.low-stock {
            border-color: #f59e0b;
            box-shadow: 0 4px 0 rgba(95, 64, 29, 0.3), inset 0 0 0 1px rgba(245, 158, 11, 0.4);
        }

        .box-id { font-weight: 700; font-size: 9px; color: #7a4a20; margin-bottom: 2px; }

        .box-info {
            background: rgba(255, 245, 220, 0.7);
            border: 1px dashed rgba(120, 74, 36, 0.45);
            border-radius: 3px;
            padding: 3px 4px;
            overflow: hidden;
        }

        .box-line { font-size: 10px; line-height: 1.3; }
        .box-line + .box-line { margin-top: 1px; }
        .box-line.low { color: #c05621; font-weight: 700; }

        /* ── LOADING / EMPTY ── */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: #6b7280;
            font-size: 14px;
            gap: 10px;
        }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid #d1d5db;
            border-top-color: #374151;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 24, 0.68);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            padding: 18px;
        }

        .modal-overlay.open { display: flex; }

        .box-modal {
            width: min(620px, 96vw);
            max-height: 85vh;
            overflow: auto;
            background: #f8f1e6;
            border: 2px solid #a67a50;
            border-radius: 12px;
            color: #352210;
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.35);
            padding: 20px;
        }

        .box-modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(120, 74, 36, 0.2);
        }

        .box-modal-title { font-size: 17px; font-weight: 700; }

        .box-modal-close {
            border: none;
            border-radius: 8px;
            background: #d94949;
            color: #fff;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
        }

        .modal-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .modal-meta-item {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(120,74,36,0.2);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 12px;
        }

        .modal-meta-item strong { display: block; font-size: 15px; margin-top: 2px; }

        .modal-items-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #7a4a20;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-item-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.5);
            border: 1px dashed rgba(120,74,36,0.3);
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .modal-item-row.low-stock-row { border-color: #f59e0b; background: rgba(245,158,11,0.08); }
        .modal-item-code { font-weight: 700; font-size: 11px; color: #7a4a20; }
        .modal-item-name { font-size: 13px; }
        .stock-badge {
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }
        .stock-ok  { background: #d1fae5; color: #065f46; }
        .stock-low { background: #fef3c7; color: #92400e; }

        .empty-modal { text-align: center; padding: 30px; color: #9a7a5a; font-size: 13px; }

        @media (max-width: 1100px) {
            .content { grid-template-columns: 1fr; }
            .topbar { justify-content: flex-start; overflow-x: auto; }
            .avatar { display: none; }
            .shelves { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 720px) {
            .shelves { grid-template-columns: 1fr; }
            .map-panel { padding: 14px; }
            .pill { white-space: nowrap; }
        }
    </style>
</head>
<body>
<div class="app">
    <header class="topbar">
        <h2 style="white-space:nowrap;font-size:16px;">Manage Your Inventory with WareBot</h2>
        <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
            <button class="pill active">Efficiency: 80/100</button>
            <button class="pill dashboard-active">Dashboard</button>
            <button class="pill" onclick="window.location.href='stimulations'">Simulations</button>
            <button class="pill">Reports</button>
            <button class="pill">Products</button>
            <button class="pill">Heat Map</button>
            <div class="avatar"></div>
        </div>
    </header>

    <main class="content">
        <section class="left-column">
            <article class="panel action-panel">
                <h3 class="action-title">Actions</h3>
                <button class="action-btn">Ai Driven Stimulations</button>
                <button class="action-btn">User Details</button>
                <button class="action-btn">Manage Products</button>
                <button class="action-btn">Quick Stock Entry</button>
            </article>
            <article class="panel warebot" style="max-height:900px;padding:0;">
                <div class="bot-card">
                    <div class="bot-head">
                        <span>WareBot Suggestions</span>
                        <span id="low-stock-badge" style="font-size:13px;background:#ea7b39;color:#fff;padding:3px 10px;border-radius:999px;display:none;"></span>
                    </div>
                    <div id="alerts-container">
                        <div class="alert warn"><span class="alert-text">Loading warehouse data…</span></div>
                    </div>
                </div>
            </article>
        </section>

        <section class="map-panel">
            <div class="map-header">
                <button class="arrow" id="btn-prev" onclick="switchSection(-1)">&#8249;</button>
                <div>
                    <div class="map-title" id="section-title">Loading…</div>
                    <div class="section-badge" id="section-badge"></div>
                </div>
                <button class="arrow" id="btn-next" onclick="switchSection(1)">&#8250;</button>
            </div>

            <div class="stats-bar" id="stats-bar"></div>
            <div class="shelves" id="shelves"></div>
        </section>
    </main>
</div>

<div class="modal-overlay" id="box-modal-overlay">
    <div class="box-modal">
        <div class="box-modal-head">
            <h3 class="box-modal-title" id="box-modal-title">Box Details</h3>
            <button class="box-modal-close" onclick="closeModal()">✕ Close</button>
        </div>
        <div id="box-modal-body"></div>
    </div>
</div>

<script>
const API = 'http://localhost:8080';

// ── State ──────────────────────────────────────────────────────
let currentSection = 0; // 0 = products, 1 = raw materials
const sections = [
    { title: 'Finished Goods Section',  badge: 'Products → Racks → Shelves → Boxes', type: 'product' },
    { title: 'Raw Materials Section',   badge: 'Raw Materials → Racks → Shelves → Boxes', type: 'raw_material' }
];

let allRacks = [], allShelves = [], allBoxes = [];
let allProducts = [], allRawMaterials = [];

// ── Fetch helpers ──────────────────────────────────────────────
async function get(path) {
    try {
        const r = await fetch(API + path);
        const data = await r.json();
        if (!r.ok || data.error) throw new Error(data.error || 'Server Error');
        return data;
    } catch (e) {
        console.warn(`⚠️ Route ${path} failed:`, e.message);
        return []; // Return empty array so the app keeps running
    }
}

// ── Bootstrap ─────────────────────────────────────────────────
async function init() {
    try {
        const container = document.getElementById('shelves');
        container.innerHTML = '<div class="loading-state">Loading warehouse data...</div>';

        let results = await Promise.all([
            get('/get-racks'),
            get('/get-shelves'),
            get('/get-boxes'),
            get('/get-products'),
            get('/get-raw-materials'),
        ]);

        // ✅ Force arrays and handle potential server errors
        allRacks = Array.isArray(results[0]) ? results[0] : [];
        allShelves = Array.isArray(results[1]) ? results[1] : [];
        allBoxes = Array.isArray(results[2]) ? results[2] : [];
        allProducts = Array.isArray(results[3]) ? results[3] : [];
        allRawMaterials = Array.isArray(results[4]) ? results[4] : [];

        // ✅ FRONTEND SORTING: Sort racks logically (R1, R2, R10)
        allRacks.sort((a, b) => {
            return a.rack_code.localeCompare(b.rack_code, undefined, { numeric: true, sensitivity: 'base' });
        });

        buildAlerts();
        renderSection();

    } catch (e) {
        console.error("Initialization Error:", e);
        document.getElementById('shelves').innerHTML =
            `<div class="loading-state">⚠️ Could not load data: ${e.message}<br>Check if server.js is running on port 8080</div>`;
    }
}
// ── Section switcher ──────────────────────────────────────────
function switchSection(dir) {
    currentSection = (currentSection + dir + sections.length) % sections.length;
    renderSection();
}

function renderSection() {
    const sec = sections[currentSection];
    document.getElementById('section-title').textContent = sec.title;
    document.getElementById('section-badge').textContent = sec.badge;

    // Filter racks to show only the ones belonging to the current section
    const sectionRacks = allRacks.filter(r => r.type === sec.type);

    if (!sectionRacks.length) {
        document.getElementById('shelves').innerHTML =
            `<div class="loading-state">
                No ${sec.type} racks found.<br>
                <small>(Found ${allRacks.length} total racks in DB)</small>
            </div>`;
        document.getElementById('stats-bar').innerHTML = '';
        return;
    }

    // Pass the specific item list (products or materials) to the map builder
    const boxItems = buildBoxItemMap(sec.type);

    renderStats(sectionRacks, boxItems, sec.type);
    renderShelves(sectionRacks, boxItems);
}
// ── Map box_id → items ─────────────────────────────────────────
function buildBoxItemMap(type) {
    const map = {};
    // Switch between the two tables based on the active section
    const items = (type === 'product') ? allProducts : allRawMaterials;

    if (!Array.isArray(items)) return map;

    items.forEach(item => {
        const boxId = item.box_id;
        if (!boxId) return;

        if (!map[boxId]) map[boxId] = [];
        map[boxId].push(item);
    });

    return map;
}
// ── Stats bar ─────────────────────────────────────────────────
function renderStats(sectionRacks, boxItems, type) {
    const rackIds = new Set(sectionRacks.map(r => r.id));
    const sectionShelves = allShelves.filter(s => rackIds.has(s.rack_id));
    const shelfIds = new Set(sectionShelves.map(s => s.id));
    const sectionBoxes = allBoxes.filter(b => shelfIds.has(b.shelf_id));

    // Count items
    let totalItems = 0, lowItems = 0;
    sectionBoxes.forEach(b => {
        const items = boxItems[b.id] || [];
        items.forEach(item => {
            totalItems++;
            if (item.stock_qty <= item.reorder_level) lowItems++;
        });
    });

    const occupiedBoxes = sectionBoxes.filter(b => (boxItems[b.id] || []).length > 0).length;

    document.getElementById('stats-bar').innerHTML = `
        <div class="stat-chip blue"><strong>${sectionRacks.length}</strong>Racks</div>
        <div class="stat-chip blue"><strong>${sectionShelves.length}</strong>Shelves</div>
        <div class="stat-chip blue"><strong>${sectionBoxes.length}</strong>Boxes</div>
        <div class="stat-chip"><strong>${occupiedBoxes}</strong>Occupied</div>
        <div class="stat-chip green"><strong>${totalItems}</strong>Items</div>
        ${lowItems > 0 ? `<div class="stat-chip red"><strong>${lowItems}</strong>Low Stock</div>` : ''}
    `;
}

// ── Render shelves/boxes ───────────────────────────────────────
function renderShelves(sectionRacks, boxItems) {
    const container = document.getElementById('shelves');
    container.innerHTML = '';

    const shelvesByRack = {};
    allShelves.forEach(s => {
        if (!shelvesByRack[s.rack_id]) shelvesByRack[s.rack_id] = [];
        shelvesByRack[s.rack_id].push(s);
    });

    const colCount = Math.min(sectionRacks.length, 4);
    container.style.setProperty('--shelf-cols', colCount);

    sectionRacks.forEach((rack, rackIdx) => {
        const shelves = (shelvesByRack[rack.id] || []).sort((a, b) => a.level - b.level);
        const card = document.createElement('div');
        card.className = 'shelf-card';

        // Rack header
        card.innerHTML = `
            <p class="shelf-id">#${rack.rack_code}</p>
            <p class="shelf-title">${rackIdx === 0 ? 'Close To Terminal' : (rackIdx === sectionRacks.length - 1 ? 'Further From Terminal' : '')}</p>
        `;

        const rackEl = document.createElement('div');
        rackEl.className = 'rack';

        if (!shelves.length) {
            rackEl.innerHTML = `<div style="color:rgba(255,255,255,0.4);font-size:11px;text-align:center;padding:15px;">Empty Rack</div>`;
        } else {
            shelves.forEach(shelf => {
                const shelfBoxes = allBoxes.filter(b => b.shelf_id === shelf.id);
                const shelfRow = document.createElement('div');
                shelfRow.style.cssText = 'display:grid;gap:6px;margin-bottom:8px;';
                shelfRow.innerHTML = `<div style="font-size:9px;color:rgba(255,255,255,0.5);">${shelf.shelf_code}</div>`;

                const boxRow = document.createElement('div');
                boxRow.style.cssText = `display:grid;grid-template-columns:repeat(${Math.max(1, shelfBoxes.length)}, 1fr);gap:6px;`;

                shelfBoxes.forEach(box => {
                    const items = boxItems[box.id] || [];
                    const hasLow = items.some(i => i.stock_qty <= i.reorder_level);

                    const boxEl = document.createElement('div');
                    boxEl.className = 'box' + (items.length === 0 ? ' empty' : '') + (hasLow ? ' low-stock' : '');
                    
                    // ✅ SHOW CODE AND NAME
                    const content = items.length === 0 
                        ? `<div class="box-line" style="color:#666; font-size:9px;">Empty</div>`
                        : items.slice(0, 2).map(item => {
                            const code = item.product_code || item.material_code || '??';
                            const name = item.product_name || item.material_name || 'No Name';
                            return `
                                <div class="box-line ${item.stock_qty <= item.reorder_level ? 'low' : ''}" style="margin-bottom:2px;">
                                    <strong style="font-size:10px; color:#f59e0b;">${code}</strong>
                                    <div style="font-size:8px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${name}</div>
                                    <div style="font-size:9px; opacity:0.8;">Qty: ${item.stock_qty}</div>
                                </div>`;
                        }).join('<hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:2px 0;">');

                    boxEl.innerHTML = `<div class="box-id">${box.box_code}</div><div class="box-info">${content}</div>`;
                    boxEl.onclick = () => openModal(box, items);
                    boxRow.appendChild(boxEl);
                });
                shelfRow.appendChild(boxRow);
                rackEl.appendChild(shelfRow);
            });
        }
        card.appendChild(rackEl);
        container.appendChild(card);
    });
}

// ── Modal ──────────────────────────────────────────────────────
function openModal(box, items) {
    document.getElementById('box-modal-title').textContent = `Box: ${box.box_code}`;

    const shelf = allShelves.find(s => s.id === box.shelf_id);
    const rack  = shelf ? allRacks.find(r => r.id === shelf.rack_id) : null;

    const lowCount = items.filter(i => i.stock_qty <= i.reorder_level).length;

    let html = `
        <div class="modal-meta">
            <div class="modal-meta-item">Location<strong>${rack?.rack_code || '—'} › ${shelf?.shelf_code || '—'}</strong></div>
            <div class="modal-meta-item">Box Code<strong>${box.box_code}</strong></div>
            <div class="modal-meta-item">Max Units<strong>${box.max_units}</strong></div>
            <div class="modal-meta-item">Items<strong>${items.length} ${lowCount > 0 ? `(${lowCount} low)` : ''}</strong></div>
        </div>
    `;

    if (!items.length) {
        html += `<div class="empty-modal">📦 This box is empty</div>`;
    } else {
        html += `<div class="modal-items-title">Contents</div>`;
        items.forEach(item => {
            const isProduct = !!item.product_code;
            const code = isProduct ? item.product_code : item.material_code;
            const name = isProduct ? item.product_name : item.material_name;
            const qty  = item.stock_qty;
            const low  = qty <= item.reorder_level;
            const unit = isProduct ? 'units' : (item.unit || 'units');

            html += `
                <div class="modal-item-row ${low ? 'low-stock-row' : ''}">
                    <div>
                        <div class="modal-item-code">${code}</div>
                        <div class="modal-item-name">${name}</div>
                        ${isProduct ? '' : `<div style="font-size:10px;color:#7a4a20;">Supplier: ${item.supplier_name || '—'}</div>`}
                    </div>
                    <div style="font-size:12px;text-align:right;">
                        <strong>${qty}</strong> ${unit}
                        <div style="font-size:10px;color:#9a7a5a;">Reorder @ ${item.reorder_level}</div>
                    </div>
                    <span class="stock-badge ${low ? 'stock-low' : 'stock-ok'}">${low ? 'LOW' : 'OK'}</span>
                </div>`;
        });
    }

    document.getElementById('box-modal-body').innerHTML = html;
    document.getElementById('box-modal-overlay').classList.add('open');
}

function closeModal() {
    document.getElementById('box-modal-overlay').classList.remove('open');
}

// Close on backdrop click / Escape
document.getElementById('box-modal-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Alerts from low-stock items ────────────────────────────────
function buildAlerts() {
    const alerts = [];

    const lowProducts = allProducts.filter(p => p.stock_qty <= p.reorder_level);
    const lowMaterials = allRawMaterials.filter(m => m.stock_qty <= m.reorder_level);

    lowProducts.slice(0, 4).forEach(p => {
        alerts.push({ type: 'warn', text: `Low stock: ${p.product_name} (${p.product_code}) — ${p.stock_qty} left, reorder @ ${p.reorder_level}` });
    });

    lowMaterials.slice(0, 4).forEach(m => {
        alerts.push({ type: 'warn', text: `Low material: ${m.material_name} (${m.material_code}) — ${m.stock_qty} ${m.unit} left` });
    });

    if (alerts.length === 0) {
        alerts.push({ type: 'info', text: 'All stock levels are healthy ✓' });
    }

    const totalLow = lowProducts.length + lowMaterials.length;
    if (totalLow > 0) {
        const badge = document.getElementById('low-stock-badge');
        badge.textContent = `${totalLow} alerts`;
        badge.style.display = 'inline-block';
    }

    document.getElementById('alerts-container').innerHTML = alerts.map(a => `
        <div class="alert ${a.type}">
            <span class="alert-text">${a.text}</span>
            <button class="alert-done-btn" onclick="this.closest('.alert').remove()">Done</button>
        </div>
    `).join('');
}

// ── Boot ───────────────────────────────────────────────────────
init();
</script>
