<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Management</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: "Monospac821 BT", "Lucida Console", "Courier New", monospace;
            background:black;
            color: #e9edf4;
            min-height: 100vh;
        }

        .app {
            min-height: 100vh;
            display: grid;
            width: 100%;
            grid-template-rows: auto auto 1fr;
            gap: 12px;
            padding: 12px;
        }
            .topbar {
                border-radius: 18px;
                display: flex;
                width: 100%;
                align-items: center;
                justify-content: space-between;
                gap: 16px;

                padding: 26px 35px;
            }

            .topbar h2 {
                font-size: 20px;
                color: #eef2f9;
            }

            .topbar-right {
                display: flex;
                gap: 10px;
                align-items: center;
            }


            .pill {
                border: none;
                color: #eef2f9;
                background: #2f3345;
                border-radius: 999px;
                padding: 8px 18px;
                font-size: 14px;
                cursor: pointer;
                transition: all 0.2s;
            }

        .pill:hover {
            background: #3a3e52;
        }

        .pill.active {
            background: #52c28f;
            color: #071811;
            font-weight: 700;
        }

        .pill.dashboard-active {
            background: #4a55d8;
            color: #eff2fe;
            font-weight: 700;
            box-shadow: 0 0 0 2px rgba(74, 85, 216, 0.28);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #eceef4, #cbd0d9);
        }

        .content {
            display: grid;
            grid-template-columns: 390px 1fr;
            gap: 16px;
            min-height: calc(100vh - 120px);
        }

        .left-column {
            display: grid;
            grid-template-rows: auto auto;
            align-content: start;
            gap: 10px;
            margin-bottom: 50px;
            max-height: 900px;
        }

        .panel {
            background: rgba(30, 33, 40, 0.95);
            border: 1px solid #323847;
            border-radius: 30px;
            padding: 18px;
            max-height: 500px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
        }

        .bot-card {
            background: linear-gradient(145deg, #0b1430, #101b3b);
            border: 1px solid #1f2f5c;
            border-radius: 34px;
            padding: 22px;
            height: 830px;
            overflow-y: auto;
        }

        .bot-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            font-size: 20px;
            font-weight: 700;
        }

        .alert {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 10px;
            border-radius: 14px;
            border: 1px solid #324670;
            background: rgba(206, 221, 255, 0.05);
            padding: 10px 12px;
            margin-bottom: 10px;
            line-height: 1.25;
            font-size: 13px;
            font-weight: 600;
        }

        .alert-text { flex: 1; }

        .alert-done-btn {
            border: none;
            border-radius: 8px;
            background: #2ac481;
            color: #082316;
            font-size: 12px;
            font-weight: 700;
            padding: 6px 10px;
            cursor: pointer;
            white-space: nowrap;
            font-family: inherit;
        }
        .action-btn-special {

    padding: 12px 22px;

    background: #151b2d;
    color: white;

    font-size: 14px;
    font-weight: 600;

    border: 2px solid transparent;
    border-radius: 12px;

    cursor: pointer;

    background-image:
        linear-gradient(#151b2d, #151b2d),
        linear-gradient(135deg, #6155e0, #05aecf, #ca3dac);

    background-origin: border-box;
    background-clip: padding-box, border-box;

    transition:
        transform 0.2s ease,
        box-shadow 0.2s ease;
}

.action-btn-special:hover {

    transform: translateY(-2px);

    box-shadow:
        0 0 12px rgba(106, 92, 255, 0.35),
        0 0 18px rgba(0, 212, 255, 0.2);
}

        .alert.warn  { border-left: 3px solid #ea7b39; }
        .alert.info  { border-left: 3px solid #34c7d8; }

        .action-panel {
            display: flex;
            flex-direction: column;
            gap: 14px;
            padding-bottom: 30px;
            justify-content: flex-start;
            max-height: 360px;
        }

        .action-title {
            font-size: 22px;
            font-weight: 700;
            color: #e9edf4;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .action-btn {
            border: none;
            border-radius: 12px;
            background: linear-gradient(180deg, #4a55d8, #4250c8);
            color: #eff2fe;
            font-size: 18px;
            letter-spacing: 1px;
            text-align: left;
            width: 100%;
            padding: 14px 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
        }

        /* ── MAP PANEL ── */
        .map-panel {
            background: #f6f6f6;
            color: #111827;
            border-radius: 34px;
            padding: 18px 22px;
            border: 1px solid #d4d8dd;
            overflow-y: auto;
            position: relative;
        }

        .map-header {
            display: grid;
            grid-template-columns: 50px 1fr 50px;
            align-items: center;
            margin-bottom: 14px;
            position: sticky;
            top: 0;
            background: #f6f6f6;
            z-index: 10;
            padding-bottom: 8px;
            border-bottom: 1px solid #e0e0e0;
        }
        .flying-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 10000;
            background: linear-gradient(145deg, #f0d4a8, #cfab77);
            border: 2px solid #f5dfbb;
            border-radius: 3px;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            transition: all 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
            color: #4b2c12;
            padding: 6px;
            font-size: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .arrow {
            font-size: 42px;
            font-weight: 700;
            color: #161616;
            text-align: center;
            cursor: pointer;
            border: none;
            background: none;
            font-family: inherit;
            border-radius: 8px;
            transition: background 0.15s;
            padding: 4px;
        }
        .search-open-btn{
            padding:10px 18px;
            border:none;
            border-radius:10px;
            background:#dc2626;
            color:white;
            font-weight:600;
            cursor:pointer;
        }

        .search-modal-overlay{
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.45);
            display:none;
            align-items:center;
            justify-content:center;
            z-index:99999;
        }

        .search-modal-overlay.open{
            display:flex;
        }

        .search-modal{
            width:620px;
            background:linear-gradient(145deg, #0b1430, #101b3b);
            border-radius:18px;
            /* background-color: linear-gradient(145deg, #0b1430, #101b3b); */
            padding:40px;
            color: white;
            box-shadow:0 20px 60px rgba(0,0,0,0.2);
        }

        .search-modal-header{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            color: white;
        }

        .search-modal-header h2{
            margin:0;
            font-size:20px;
            color: white;
        }

        .search-modal-header button{
            border:none;
            background:none;
            font-size:20px;
            cursor:pointer;
            color: white;
        }

        .search-modal-body{
            display:flex;
            color: white;
            flex-direction:column;
            gap:14px;
        }

        .search-modal-body input,
        .search-modal-body select{
            padding:12px;
            border-radius:10px;
            border:1px solid #ccc;
        }

        .search-modal-body button{
            padding:12px;
            border:none;
            border-radius:10px;
            background:#dc2626;
            color:white;
            font-weight:600;
            cursor:pointer;
        }

        .arrow:hover { background: rgba(0,0,0,0.08); }

        .map-title {
            text-align: center;
            font-size: 26px;
            letter-spacing: 2px;
            font-weight: 700;
            color: #111827;
        }

        .section-badge {
            text-align: center;
            font-size: 11px;
            color: #6b7280;
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* ── STATS BAR ── */
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 6px 14px;
            font-size: 12px;
            color: #374151;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }

        .stat-chip strong { font-size: 18px; color: #111827; }
        .stat-chip.green strong { color: #059669; }
        .stat-chip.red   strong { color: #dc2626; }
        .stat-chip.blue  strong { color: #2563eb; }

        /* ── SHELVES GRID ── */
        .shelves {
            display: grid;
            grid-template-columns: repeat(var(--shelf-cols, 3), minmax(200px, 1fr));
            gap: 24px 32px;
            padding: 4px 8px 28px;
        }

        .shelf-card { display: grid; gap: 8px; }

        .shelf-id {
            font-size: 12px;
            color: #374151;
            font-family: inherit;
            text-transform: lowercase;
            margin-bottom: 2px;
        }

        .shelf-title {
            min-height: 18px;
            font-size: 13px;
            color: #111827;
        }
        .box.moving {
            outline: 3px solid #4a55d8;
            transform: scale(1.05);
            transition: all 0.4s ease;
        }

        .rack {
            min-height: 200px;
            border-radius: 8px;
            display: grid;
            gap: 8px;
            align-content: start;
            padding: 12px;
            background:
                repeating-linear-gradient(
                    to right,
                    #a76543 0,
                    #b97753 16px,
                    #a96845 32px
                );
            border: 5px solid #9a5d3e;
            box-shadow: inset 0 -8px 0 rgba(65, 33, 17, 0.2);
        }

        .box {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 4px;
            align-content: start;
            width: 100%;
            min-height: 90px;
            padding: 6px;
            background: linear-gradient(145deg, #f0d4a8, #cfab77);
            border: 2px solid #f5dfbb;
            box-shadow: 0 4px 0 rgba(95, 64, 29, 0.3);
            border-radius: 3px;
            color: #4b2c12;
            font-size: 11px;
            line-height: 1.2;
            transition: opacity 200ms ease, transform 200ms ease, box-shadow 250ms ease;
            cursor: pointer;
        }

        .box:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 0 rgba(95, 64, 29, 0.3);
        }

        .box.empty {
            background: linear-gradient(145deg, #e8e8e8, #d0d0d0);
            border-color: #ccc;
            color: #888;
            opacity: 0.6;
        }

        .box.low-stock {
            border-color: #f59e0b;
            box-shadow: 0 4px 0 rgba(95, 64, 29, 0.3), inset 0 0 0 1px rgba(245, 158, 11, 0.4);
        }

        .box-id { font-weight: 700; font-size: 9px; color: #7a4a20; margin-bottom: 2px; }

        .box-info {
            background: rgba(255, 245, 220, 0.7);
            border: 1px dashed rgba(120, 74, 36, 0.45);
            border-radius: 3px;
            padding: 3px 4px;
            overflow: hidden;
        }

        .box-line { font-size: 10px; line-height: 1.3; }
        .box-line + .box-line { margin-top: 1px; }
        .box-line.low { color: #c05621; font-weight: 700; }

        /* ── LOADING / EMPTY ── */
        .loading-state {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: #6b7280;
            font-size: 14px;
            gap: 10px;
        }

        .spinner {
            width: 20px; height: 20px;
            border: 2px solid #d1d5db;
            border-top-color: #374151;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── MODAL ── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 24, 0.68);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20000;
            padding: 18px;
        }

        .modal-overlay.open { display: flex; }

        .box-modal {
            width: min(620px, 96vw);
            max-height: 85vh;
            overflow: auto;
            background: #f8f1e6;
            border: 2px solid #a67a50;
            border-radius: 12px;
            color: #352210;
            box-shadow: 0 16px 35px rgba(0, 0, 0, 0.35);
            padding: 20px;
        }

        .box-modal-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(120, 74, 36, 0.2);
        }

        .box-modal-title { font-size: 17px; font-weight: 700; }

        .box-modal-close {
            border: none;
            border-radius: 8px;
            background: #d94949;
            color: #fff;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
        }

        .modal-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 14px;
        }

        .modal-meta-item {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(120,74,36,0.2);
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 12px;
        }

        .modal-meta-item strong { display: block; font-size: 15px; margin-top: 2px; }

        .modal-items-title {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #7a4a20;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .modal-item-row {
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
            background: rgba(255,255,255,0.5);
            border: 1px dashed rgba(120,74,36,0.3);
            border-radius: 6px;
            padding: 8px 10px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .modal-item-row.low-stock-row { border-color: #f59e0b; background: rgba(245,158,11,0.08); }
        .modal-item-code { font-weight: 700; font-size: 11px; color: #7a4a20; }
        .modal-item-name { font-size: 13px; }
        .stock-badge {
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 700;
        }
        .apply-btn {
            padding: 8px 14px;
            background: #2e7d32;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        .apply-btn:hover {
            background: #1b5e20;
        }
        .stock-ok  { background: #d1fae5; color: #065f46; }
        .stock-low { background: #fef3c7; color: #92400e; }

        .empty-modal { text-align: center; padding: 30px; color: #9a7a5a; font-size: 13px; }

        @media (max-width: 1100px) {
            .content { grid-template-columns: 1fr; }
            .topbar { justify-content: flex-start; overflow-x: auto; }
            .avatar { display: none; }
            .shelves { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 720px) {
            .shelves { grid-template-columns: 1fr; }
            .map-panel { padding: 14px; }
            .pill { white-space: nowrap; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <h2>OptiWare-AI</h2>
        <div class="topbar-right">

            <button class="pill active" id="efficiency_score">Warehouse Efficiency: 0/100</button>
            <button class="pill dashboard-active" onclick="window.location.href='/app'">Dashboard</button>


            <button class="pill" onclick="window.location.href='/stimulations'">Simulations</button>
            <button class="pill" onclick="window.location.href='/products'">Products</button>
            <button class="pill" onclick="window.location.href='/setup'">Setup Warehouse</button>
        </div>
    </header>
<div class="app">
    
    <main class="content">
        <section class="left-column">
            <article class="panel action-panel">


            <button id="optimize_button" class="action-btn-special">
                Optimize Finish Goods Layout
            </button>

            <button id="optimize_rm_button" class="action-btn-special">
                Optimize Raw Materials Layout
            </button>
            <button id="open_search_modal" class="search-open-btn" style="padding:10px ;background:#7125eb;color:white;font-weight:600;border:none;border-radius:8px;cursor:pointer;">
                🔍 Search Item
            </button>
            </article>
            <article class="panel" style="height:100%;padding:0;">
                <div class="bot-card">
                    <div class="bot-head">
                        <span>Optiware-AI Suggestions</span> 

                        <span id="low-stock-badge" style="font-size:13px;background:#ea7b39;color:#fff;padding:3px 10px;border-radius:999px;display:none;"></span>
                    </div>
                    <div id="alerts-container" style="max-height:auto;">

              

                    </div>
                </div>
            </article>
        </section>

        <section class="map-panel">
            <div class="map-header">
                <button class="arrow" id="btn-prev" onclick="switchSection(-1)">&#8249;</button>
                <div><div class="map-title" id="section-title">Loading…</div>
                    <div class="section-badge" id="section-badge"></div></div>
                <button class="arrow" id="btn-next" onclick="switchSection(1)">&#8250;</button>
            </div>

            <div class="stats-bar" id="stats-bar"></div><div class="shelves" id="shelves"></div>
        </section>
    </main>
</div>

<div class="modal-overlay" id="box-modal-overlay">
    <div class="box-modal">
        <div class="box-modal-head">
            <h3 class="box-modal-title" id="box-modal-title">Box Details</h3><button class="box-modal-close" onclick="closeModal()">✕ Close</button>
        </div>
        <div id="box-modal-body"></div>
    </div>
</div>
<div id="search_modal_overlay" class="search-modal-overlay">

    <div class="search-modal">

        <div class="search-modal-header">
            <h2>Search Inventory Item</h2>

            <button onclick="closeSearchModal()">
                ✕
            </button>
        </div>

        <div class="search-modal-body">

            <select id="search_type">
                <option value="all">All</option>
                <option value="product">Products</option>
                <option value="raw_material">Raw Materials</option>
            </select>

            <input
                type="text"
                id="item_search"
                placeholder="Search product or raw material..."
                list="items_list"
            >

            <datalist id="items_list"></datalist>

            <button id="search_btn">
                Search
            </button>

        </div>

    </div>

</div>
<script>
    const API = "https://amity-major-project-warehouse-management.onrender.com";
    const FASTAPI="https://amity-major-project-warehouse-management-1bec.onrender.com"
    let currentSection = 0;
    let layoutUpdates = []; 
    const sections=[
        { title: 'Finished Goods Section',  
        badge: 'Products → Racks → Shelves → Boxes',
        type: 'product' },
        { title: 'Raw Materials Section',
        badge: 'Raw Materials → Racks → Shelves → Boxes', 
        type: 'raw_material' 
        }
    ];
    let pendingLayoutChanges = false;

    let allRacks=[],allShelves=[], allBoxes=[];
    let allProducts=[], allRawMaterials=[];

    async function get(path) {
        try {
            const r=await fetch(API + path);
            if (!r.ok) return [];
            return await r.json();
        } catch (e) {
            console.error(e);
            return [];
        }
    }
        async function verifyUser(){

        const token = localStorage.getItem("token");
        // console.log(token)
        // alert(token)
        if(!token){
            // alert("no token")
            window.location.href="/login";
            return;
        }
        try{
            const response = await fetch(
                `${API}/verify-user`,
                {
                    headers:{
                        Authorization:`Bearer ${token}`
                    }
                }
            );

            const result = await response.json();
            // alert(JSON.stringify(result));
            if(!result || !result.success){

                localStorage.removeItem("token");
                localStorage.removeItem("user");

                // window.location.href="/app";
                return;
            }

            // document.getElementById("username").innerText =
            //     result.user.name;

        }catch(e){

        
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            // alert(str(e));

            window.location.href="/login";
        }
    }
    
    
async function init() {
    verifyUser();

    try {
        const container = document.getElementById('shelves');

        container.innerHTML =
            '<div class="loading-state">Syncing Warehouse Data...</div>';

        const data = await fetch(`${FASTAPI}/get-warehouse-data`).then(res => res.json());

        allRacks = data.racks || [];
        allShelves = data.shelves || [];
        allBoxes = data.boxes || [];
        allProducts = data.products || [];
        allRawMaterials = data.raw_materials || [];

        const isEmpty =
            allRacks.length === 0 ||
            allShelves.length === 0 ||
            allBoxes.length === 0 ||
            allProducts.length === 0 ||
            allRawMaterials.length === 0;

        if (isEmpty) {

            // alert("Some data is missing. Please complete the setup.");

            // alert(
            //     `Racks: ${allRacks.length}, ` +
            //     `Shelves: ${allShelves.length}, ` +
            //     `Boxes: ${allBoxes.length}, ` +
            //     `Products: ${allProducts.length}, ` +
            //     `Raw Materials: ${allRawMaterials.length}`
            // );

            window.location.href = "/setup";

            return;
        }

        allRacks.sort((a, b) =>
            a.rack_code.localeCompare(
                b.rack_code,
                undefined,
                { numeric: true }
            )
        );

        renderSection();

        await loadEfficiency();

        populateSearchItems();

    } catch (e) {

        console.error(e);

        document.getElementById('shelves').innerHTML =
            `<div class="loading-state">⚠️ Error loading data</div>`;
    }
}

function populateSearchItems() {

    const list = document.getElementById("items_list");
    list.innerHTML = "";

    allProducts.forEach(p => {

        const option = document.createElement("option");
        option.value = p.product_name;
        list.appendChild(option);

    function switchSection(dir) {

        document.getElementById('section-badge').textContent=sec.badge;
        const sectionRacks = allRacks.filter(r => r.type === sec.type);

            document.getElementById('shelves').innerHTML = `<div class="loading-state">No ${sec.type} racks found.</div>`;

    function buildBoxItemMap(type) {
        const map={};
        const items=(type === 'product') ? allProducts : allRawMaterials;
        

        items.forEach(item => {
            
            if (!item.box_id) return;
            if (!map[item.box_id]) map[item.box_id]=[];
            map[item.box_id].push(item);
        });
        return map;
    }

    function renderStats(sectionRacks, boxItems, type) {
        const rackIds=new Set(sectionRacks.map(r => r.id));
        const sectionShelves=allShelves.filter(s => rackIds.has(s.rack_id));


        const shelfIds=new Set(sectionShelves.map(s => s.id));
        const sectionBoxes=allBoxes.filter(b => shelfIds.has(b.shelf_id));

        let totalItems=0, lowItems=0;


        sectionBoxes.forEach(b => {
            const items = boxItems[b.id] || [];
            items.forEach(item => {
                totalItems++;
                if (item.stock_qty<=(item.reorder_level || 0)) lowItems++;
            });

            <div class="stat-chip"><strong>${occupiedBoxes}</strong>Occupied</div>
            <div class="stat-chip green"><strong>${totalItems}</strong>Items</div>
            ${lowItems > 0 ? `<div class="stat-chip red"><strong>${lowItems}</strong>Low Stock</div>` : ''}

function normalizeLocation(loc) {
    if (!loc || loc === "Unassigned") return loc;

    // Extract rack
    const rackMatch = loc.match(/R+(\d+)/i);

    // Extract ALL shelf matches (important)
    const shelfMatches = [...loc.matchAll(/SH(\d+)/gi)];

    // Extract box
    const boxMatch = loc.match(/B+(\d+)/i);

    if (!rackMatch || shelfMatches.length === 0 || !boxMatch) {
        console.warn("Bad loc format:", loc);
        return loc;
    }

    const rack = String(parseInt(rackMatch[1])).padStart(2, '0');

    let shelfRaw = shelfMatches[0][1];
    let shelf = String(parseInt(shelfRaw.slice(0, 2))).padStart(2, '0');

    const box = String(parseInt(boxMatch[1])).padStart(2, '0');

    const rackCode  = `RR${rack}`;
    const shelfCode = `${rackCode}-SHR${rack}-SH00`;
    const boxCode   = `BB${box}`;

    return `${rackCode} ${shelfCode} ${boxCode}`;
}

function getCoordsFromLocation(loc) {
    const parts = loc.split("→").map(s => s.trim());
    if (parts.length !== 3) return null;

    const [rackCode, shelfCode, boxCode] = parts;

    const rack = allRacks.find(r => r.rack_code == rackCode);
    if (!rack) return null;

    const shelf = allShelves.find(s => 
        s.rack_id == rack.id && s.shelf_code == shelfCode
    );
    if (!shelf) return null;

    const boxes = allBoxes
        .filter(b => b.shelf_id == shelf.id)
        .sort((a, b) => a.box_code.localeCompare(b.box_code, undefined, { numeric: true }));

    const index = boxes.findIndex(b => b.box_code == boxCode);
    if (index === -1) return null;

    return {
        shelf: shelf.id,
        rack: rack.id,
        col: index + 1
    };
}

function findBoxByPath_rawmaterials(loc) {

    if (!rackMatch || shelfMatch.length === 0 || !boxMatch) {
        console.warn("Bad loc format:", loc);
        return null;

        const shelfMatches = [...loc.matchAll(/SH(\d+)/gi)];
        const boxMatch = loc.match(/BX(\d+)/i);

        if (!rackMatch || shelfMatches.length === 0 || !boxMatch) {
            console.warn("Bad loc format:", loc);
            return loc;
        }

        rack = rackMatch[1];
        shelf = shelfMatches[shelfMatches.length - 1][1]; // last SH
        box = boxMatch[1];
    }

    else if (loc.includes("RR")) {

        const rackMatch = loc.match(/RR(\d+)/i);
        const shelfMatches = [...loc.matchAll(/SH(\d+)/gi)];
        const boxMatch = loc.match(/BB(\d+)/i);

        if (!rackMatch || shelfMatches.length === 0 || !boxMatch) {
            console.warn("Bad loc format:", loc);
            return loc;
        }

        rack = rackMatch[1];
        shelf = shelfMatches[shelfMatches.length - 1][1];
        box = boxMatch[1];
    }

    else {
        console.warn("Unknown format:", loc);
        return loc;
    }

    // normalize to 2 digits
    rack  = String(parseInt(rack)).padStart(2, '0');
    shelf = String(parseInt(shelf)).padStart(2, '0');
    box   = String(parseInt(box)).padStart(2, '0');

    const rackCode  = `RRK-M${rack}`;
    const shelfCode = `${rackCode}-SHRK-M${rack}-SH${shelf}`;
    const boxCode   = `BRK-M${rack}-SH${shelf}-BX${box}`;

    return `${rackCode} ${shelfCode} ${boxCode}`;
}

document.getElementById("optimize_rm_button").onclick = async () => {
    const btn = document.getElementById("optimize_rm_button");
    if(document.getElementById("section-title").innerHTML!="Raw Materials Section"){
        document.getElementById("btn-prev").click()
    }
    btn.disabled = true;
    btn.style.opacity = "0.5";
    btn.textContent = "Optimizing Raw Materials Layout...";

    let data = await get("/optimize_raw_materials");

    if (!data || !data.suggestions) {
        btn.disabled = false;
        btn.style.opacity = "1";
        btn.textContent = "Optimize Raw Materials";
        return;
    }

    let movementLogs = [];
    layoutUpdates = [];

    renderSection();
    await new Promise(r => setTimeout(r, 300));

    const locationMap = buildLocationMap(); 

    for (const s of data.suggestions) {

        if (!s.to || s.to === "No box available") {
            movementLogs.push(`⚠️ No space for ${s.material}`);
            continue;
        }

        const fromLoc = normalizeLocation_rawmaterials(s.from);
        const toLoc   = normalizeLocation_rawmaterials(s.to);

        if (!fromLoc || !toLoc || fromLoc === toLoc) continue;

        await animateBoxMove_rawmaterials(fromLoc, toLoc, 200);
        swapBoxData(fromLoc, toLoc, locationMap);

        movementLogs.push(`Moved ${s.material} from ${fromLoc} → ${toLoc}`);

        layoutUpdates.push({
            id: s.material_id,   
            type: "raw_material",  
            box_id: locationMap[toLoc]
        });
    }
    console.log(layoutUpdates)
    pendingLayoutChanges = true;

    if (movementLogs.length > 0) {

        const formattedText = `🔔
            <ul style="margin:0; padding-left:18px;">
                ${movementLogs.map(m => `<li>${m}</li>`).join("")}
            </ul>
            <br>
            <b>Click on "Apply" button to save changes.</b>
        `;

        buildAlerts([
            {
                type: 'info',
                text: formattedText
            }
        ],true);
    }

    btn.disabled = false;
    btn.style.opacity = "1";
    btn.textContent = "Optimize Raw Materials";

};
const locationMap = buildLocationMap();
function swapBoxData(fromLoc, toLoc, locationMap) {
    const fromBoxId = locationMap[fromLoc];
    const toBoxId   = locationMap[toLoc];

    if (!fromBoxId || !toBoxId) return;

    const fromItems = allRawMaterials.filter(i => i.box_id == fromBoxId);
    const toItems   = allRawMaterials.filter(i => i.box_id == toBoxId);

    fromItems.forEach(i => i.box_id = toBoxId);
    toItems.forEach(i => i.box_id = fromBoxId);
}
document.getElementById("open_search_modal").onclick = () => {

    document

        .classList.add("open");

    populateSearchItems();
};
function closeSearchModal(){

    document
        .getElementById("search_modal_overlay")
        .classList.remove("open");
}
document.getElementById("search_modal_overlay")
.addEventListener("click", e => {

    if(e.target === e.currentTarget){
        closeSearchModal();
    }
});
document.getElementById("search_btn").onclick = () => {

    const value = document.getElementById("item_search")
        .value
        .trim()
        .toLowerCase();

    if (!value) return;

    let foundItem = null;

    function searchItem() {

        // PRODUCTS
        foundItem = allProducts.find(p =>
            (p.product_name || "").toLowerCase() === value ||
            (p.product_code || "").toLowerCase() === value
        );

        // RAW MATERIALS
        if (!foundItem) {
            foundItem = allRawMaterials.find(r =>
                (r.material_name || "").toLowerCase() === value ||
                (r.material_code || "").toLowerCase() === value
            );
        }

        return foundItem;
    }

    foundItem = searchItem();

    if (!foundItem || !foundItem.box_id) {
        alert("Item not found");
        return;
    }

    function focusBox() {

        const targetBox = allBoxes.find(b => b.id == foundItem.box_id);

        if (!targetBox) {
            alert("Box not found");
            return;
        }

        const boxEl = [...document.querySelectorAll(".box")]
            .find(el => {

                const loc = el.getAttribute("data-loc");

                return loc && loc.includes(
                    String(targetBox.box_code).padStart(2, '0')
                );
            });

        if (!boxEl) {
            return false; // not in current section
        }

        boxEl.scrollIntoView({
            behavior: "smooth",
            block: "center"
        });

        boxEl.style.outline = "4px solid blue";
        boxEl.style.transform = "scale(1.05)";

        setTimeout(() => {
            boxEl.style.outline = "";
            boxEl.style.transform = "";
        }, 5000);

        return true;
    }

    // try first in current section
    let found = focusBox();

    if (!found) {

        // switch section and try again
        document.getElementById("btn-prev").click();

        setTimeout(() => {

            let foundAgain = focusBox();

            if (!foundAgain) {
                alert("Item not available in any section");
            }

        }, 400);
    }

    closeSearchModal();
    document.getElementById("item_search").value = "";
};</script>
