<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>OptiWare-AI - Login & Register</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:"Monospac821 BT","Lucida Console","Courier New",monospace;

    background:black;

    color:#e9edf4;

    min-height:100vh;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;
    padding:20px;
}

.bg-glow{
    position:absolute;
    width:500px;
    height:500px;
    border-radius:50%;

    background:rgba(82,194,143,0.08);

    filter:blur(100px);

    top:-120px;
    right:-120px;

    z-index:0;
}

.bg-glow2{
    position:absolute;
    width:450px;
    height:450px;
    border-radius:50%;

    background:rgba(74,85,216,0.08);

    filter:blur(100px);

    bottom:-120px;
    left:-120px;

    z-index:0;
}

.auth-container{
    position:relative;
    z-index:1;

    width:420px;
    max-width:100%;

    background:rgba(20,24,35,0.95);

    border:1px solid #2e3547;

    border-radius:24px;

    padding:40px;

    box-shadow:
        0 20px 60px rgba(0,0,0,0.55);

    backdrop-filter:blur(10px);
}

.logo{
    width:auto;
    height:auto;

    margin:auto auto 18px;

    border-radius:20px;



    display:flex;
    align-items:center;
    justify-content:center;

    font-size:30px;
    font-weight:bold;

    color:white;
}

.header{
    text-align:center;
    margin-bottom:30px;
}

.header h1{
    font-size:32px;
    margin-bottom:10px;
}

.header p{
    color:#9ba6b5;
    line-height:1.6;
    font-size:14px;
}

.form-group{
    display:flex;
    flex-direction:column;
    margin-bottom:18px;
}

.form-group label{
    margin-bottom:8px;
    color:#a3abff;
    font-size:13px;
}

.form-group input{
    background:#0d1018;

    border:1px solid #323847;

    border-radius:12px;

    padding:14px;

    color:#eef2f9;

    outline:none;

    transition:0.25s;
    font-family:inherit;
    font-size:14px;
}

.form-group input:focus{
    border-color:#52c28f;

    box-shadow:
        0 0 0 3px rgba(82,194,143,0.12);
}

.error-msg{
    color:#ff7b72;
    font-size:12px;
    padding:10px;
    background:rgba(255,123,114,0.1);
    border-radius:8px;
    margin-bottom:15px;
    display:none;
}

.error-msg.show{
    display:block;
}

.success-msg{
    color:#52c28f;
    font-size:12px;
    padding:10px;
    background:rgba(82,194,143,0.1);
    border-radius:8px;
    margin-bottom:15px;
    display:none;
}

.success-msg.show{
    display:block;
}

.submit-btn{
    width:100%;

    border:none;

    background:
        linear-gradient(
            135deg,
            #52c28f,
            #3fa978
        );

    color:#071811;

    font-weight:700;

    padding:14px;

    border-radius:14px;

    cursor:pointer;

    transition:0.25s;

    font-size:15px;
    font-family:inherit;
}

.submit-btn:hover{
    transform:translateY(-2px);

    box-shadow:
        0 10px 30px rgba(82,194,143,0.25);
}

.submit-btn:disabled{
    opacity:0.6;
    cursor:not-allowed;
}

.footer{
    margin-top:24px;
    text-align:center;
    color:#7c8798;
    font-size:12px;
}

@media(max-width:500px){

    .auth-container{
        padding:28px;
    }

    .header h1{
        font-size:26px;
    }
}

</style>
</head>

<body>

<div class="bg-glow"></div>
<div class="bg-glow2"></div>

<div class="auth-container">

    <div class="logo">OptiWare-AI</div>

    <div class="header">
        <h1>Welcome Back</h1>
        <p>Login to access OptiWare inventory intelligence and predictive analytics.</p>
    </div>

    <!-- Error & Success Messages -->
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- LOGIN FORM -->
    <form onsubmit="handleLogin(event)">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="Enter your email" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password" required>
        </div>

        <button type="submit" class="submit-btn" id="loginBtn">Login In</button>
    </form>

</div>

<script>

const API_URL = "https://amity-major-project-warehouse-management.onrender.com";
// Handle Login
async function handleLogin(event) {
    event.preventDefault();

    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');

    btn.disabled = true;
    btn.innerText = 'Signing In...';

    try {
        const response = await fetch(`${API_URL}/login-user`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });

        const result = await response.json();

        if (!result.success) {
            errorMsg.innerText = result.error || 'Login failed';
            errorMsg.classList.add('show');
            btn.disabled = false;
            btn.innerText = 'Sign In';
            return;
        }

        // Save token
        localStorage.setItem("token", result.token);
        localStorage.setItem('user', JSON.stringify(result.user));

        successMsg.innerText = 'Login successful! Redirecting...';
        successMsg.classList.add('show');

        btn.innerText = 'Success ✓';

        setTimeout(() => {
            window.location.href = '/app';
        }, 1000);

    } catch (e) {
        console.error(e);
        errorMsg.innerText = 'Connection error. Please try again.';
        errorMsg.classList.add('show');
        btn.disabled = false;
        btn.innerText = 'Sign In';
    }
}

// Check if user is already logged in
window.addEventListener('load', function() {
    const token = localStorage.getItem("authToken");
    if (token) {
        window.location.href = '/app';
    }
});

</script>
<footer style="
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
    text-align: center;
    padding: 14px 20px;
    font-size: 13px;
    color: #7f8a9a;
    background: rgba(10,12,18,0.88);
    backdrop-filter: blur(8px);
    border-top: 1px solid rgba(255,255,255,0.06);
    letter-spacing: 0.5px;
    z-index: 999;
">
    <span style="color:#52c28f;font-weight:600;">OptiWare-AI</span>
    • Designed & Developed by
    <span style="color:#ffffff;font-weight:700;">Nagasheshu</span>
</footer>
</body>
</html>
